<script type="text/javascript">
  $(function() {
    $('#FirstName').keydown(function(e) {
       if (e.shiftKey || e.ctrlKey || e.altKey) {
        e.preventDefault();
      } else {
        var key = e.keyCode;
        if (!((key == 8) || (key >= 65 && key <= 90) ||(key >= 48 && key <= 57)||(key == 190))) {
          e.preventDefault();
        }
      }
    });

  });
   
</script>
